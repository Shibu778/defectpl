name: defectpl-dev

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Runtime ──────────────────────────────────────────────
  - python>=3.11,<3.13
  - numpy>=2.0
  - pyyaml>=6.0
  - click>=8.1
  - matplotlib>=3.8
  - plotly>=5.18
  - monty>=2024.7

  # ── Optional heavy deps (included for full dev environment) ──
  - pymatgen>=2024.7        # VASP I/O and structure handling
  - phonopy>=2.3            # phonon supercell calculations

  # ── Testing ──────────────────────────────────────────────
  - pytest>=8.0
  - pytest-cov>=5.0

  # ── Linting / formatting ──────────────────────────────────
  - ruff>=0.5
  - pre-commit>=3.7

  # ── Documentation ────────────────────────────────────────
  - pip

  - pip:
      - mkdocs>=1.6.0
      - mkdocs-material>=9.5.0
      - mkdocstrings[python]>=0.25.0
      - pymdown-extensions>=10.7

# After activating this environment, install defectpl itself with:
#   pip install -e ".[all]"
