{% if config.theme.logo %}
  {# Light-mode logo (color mark) — hidden in dark mode via CSS #}
  <img src="{{ config.theme.logo }}"
       alt="{{ config.site_name }}"
       class="md-logo__img logo-light-mode"
       draggable="false">
  {# Dark-mode logo (mono-white mark) — hidden in light mode via CSS #}
  <img src="{{ 'assets/defectpl-mark-mono-white.svg' | url }}"
       alt="{{ config.site_name }}"
       class="md-logo__img logo-dark-mode"
       draggable="false">
{% else %}
  {% include ".icons/logo.svg" %}
{% endif %}
