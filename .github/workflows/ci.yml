name: CI

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "*.rst"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint — runs once on ubuntu / Python 3.12 to keep noise low
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check defectpl/ tests/

      - name: Format check
        run: ruff format --check defectpl/ tests/

  # ──────────────────────────────────────────────────────────────────────────
  # Tests — matrix of OS × Python version
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Cache pip (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: |
          pip install ".[all]" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -q --tb=short --cov=defectpl --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        # Only runs on one matrix cell to avoid duplicate uploads.
        # CODECOV_TOKEN is optional: public repos can upload without it.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # optional for public repos; skip if not set
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false   # never fail CI if Codecov is unavailable

  # ──────────────────────────────────────────────────────────────────────────
  # Summary gate — other workflows can depend on this single job
  # ──────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
